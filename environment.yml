# Conda environment for pdb-homology-leakage-benchmark
#
# Create with:   conda env create -f environment.yml
# Activate with: conda activate pdb-leakage
#
# NOTE: the version pins below are a known-good reference set. For exact,
# bit-level reproducibility, replace them with the versions from the machine
# that produced the released results — capture those with:
#     pip freeze > requirements-lock.txt
#     conda env export --no-builds > environment-lock.yml
# (On Colab, run `!pip freeze` in the notebook and copy the relevant lines.)

name: pdb-leakage

channels:
  - conda-forge
  - bioconda
  - pytorch

dependencies:
  - python=3.10
  # --- clustering ---
  - bioconda::mmseqs2=15.6f452
  # --- scientific stack ---
  - numpy=1.26.4
  - pandas=2.2.2
  - scipy=1.13.1
  - scikit-learn=1.5.1
  - matplotlib=3.9.1
  # --- deep learning (CPU build; use pytorch-cuda for GPU, see note) ---
  - pytorch::pytorch=2.3.1
  # --- protein language model + pip-only packages ---
  - pip=24.0
  - pip:
      - transformers==4.42.4
      - fair-esm==2.0.0
      - huggingface-hub==0.24.0

# --- GPU note ---
# The ESM-2 650M embedding step (Section 4) benefits greatly from a GPU.
# For a CUDA build, replace the pytorch line above with, e.g.:
#     - pytorch::pytorch=2.3.1
#     - pytorch::pytorch-cuda=12.1
#     - nvidia::cuda-toolkit
# and add the `nvidia` channel. Everything else in the pipeline runs on CPU.
#
# --- ESM-2 model ---
# The model checkpoint `esm2_t33_650M_UR50D` is downloaded automatically by
# `transformers`/`fair-esm` on first use; no manual download is required.
